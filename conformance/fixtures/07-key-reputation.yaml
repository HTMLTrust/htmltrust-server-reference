# 07 — Key reputation
#
# After creating an author we can fetch the public key, then query the
# directory reputation endpoint for that key id. The reputation envelope
# must include trustScore (0..1) and verifiedSignatures.
name: Fetch reputation for an author's key
description: |
  GET /directory/keys/{keyId}/reputation returns a KeyReputation envelope.
steps:
  - name: Create author
    request:
      method: POST
      path: /authors
      headers:
        X-API-KEY: $generalApiKey
      body:
        name: "Reputable 07-$run_nonce"
        keyType: "HUMAN"
        keyAlgorithm: "ED25519"
    expect:
      status: 201
    capture:
      authorId: $.author.id

  - name: Fetch the author's public key to learn its id
    request:
      method: GET
      path: /authors/$authorId/public-key
    expect:
      status: 200
      schema: PublicKey
    capture:
      keyId: $.id

  - name: Fetch reputation for the key
    request:
      method: GET
      path: /directory/keys/$keyId/reputation
    expect:
      status: 200
      schema: KeyReputation

  - name: Reputation for an unknown key returns 404
    request:
      method: GET
      path: /directory/keys/000000000000000000000000/reputation
    expect:
      status: 404
      schema: Error
